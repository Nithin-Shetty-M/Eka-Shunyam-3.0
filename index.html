<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekashunyam Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-image: url('assets/bg.png');
    /* background:linear-gradient(to right,#000000,#0f2027,#203a43,#2c5364); */
    color:rgb(255, 255, 255);
    font-family:'Orbitron',sans-serif;
    text-align:center;
    text-shadow:0 0 15px #030fe9, 0 0 25px #006aff;

    background-size: cover; 
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

}

.container{
    width:95%;
    /* margin-top: 50px;
    margin-left: 800px; */
}

h1{
    letter-spacing:4px;
    margin-bottom:30px;
    font-size:1.8rem;
    opacity:0.8;
}

.countdown{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.time-box{
    min-width:80px;
}

.number{
    font-size:2.8rem;
    font-weight:bold;
    text-shadow:0 0 15px #030fe9, 0 0 25px #00ffff;
}

.label{
    font-size:0.8rem;
    opacity:0.7;
    letter-spacing:2px;
    text-shadow:0 0 15px #0303e9, 0 0 25px #00ffff;

}
.wednesday-style {
    font-family: 'Pirata One', serif;
    font-size: 4rem;
    letter-spacing: 0.2em; /* This creates that cinematic look */
    color: #ffffff;
    text-transform: uppercase;
    filter: drop-shadow(0 0 5px rgba(0,0,0,0.8));
}

@media(max-width:480px){
    .number{font-size:2rem;}
    .time-box{min-width:60px;}
}
</style>
</head>

<body>

<div class="container">
    <h1 class="wednesday-style">EKASHUNYAM <br>3.O</h1>
    <h1 class="wednesday-style">IS COMING SOON</h1>

    <div class="countdown">
        <div class="time-box">
            <div id="months" class="number">00</div>
            <div class="label">MONTHS</div>
        </div>

        <div class="time-box">
            <div id="days" class="number">00</div>
            <div class="label">DAYS</div>
        </div>

        <div class="time-box">
            <div id="hours" class="number">00</div>
            <div class="label">HOURS</div>
        </div>

        <div class="time-box">
            <div id="minutes" class="number">00</div>
            <div class="label">MINUTES</div>
        </div>

        <div class="time-box">
            <div id="seconds" class="number">00</div>
            <div class="label">SECONDS</div>
        </div>
    </div>
    &nbsp; <br>
    <small>WHERE CODE MEETS THE DARKNESS</small> <br> 

</div>

<script>
/* 🎯 SET YOUR TARGET DATE HERE */
const targetDate = new Date("2026-04-02T00:00:00");

function updateCountdown(){
    const now = new Date();

    let totalSeconds = Math.floor((targetDate - now) / 1000);

    if(totalSeconds <= 0){
        document.querySelector(".container").innerHTML = "<h1>TIME IS UP</h1>";
        return;
    }

    let months = Math.floor(totalSeconds / (30*24*60*60));
    totalSeconds %= (30*24*60*60);

    let days = Math.floor(totalSeconds / (24*60*60));
    totalSeconds %= (24*60*60);

    let hours = Math.floor(totalSeconds / (60*60));
    totalSeconds %= (60*60);

    let minutes = Math.floor(totalSeconds / 60);
    let seconds = totalSeconds % 60;

    document.getElementById("months").textContent = String(months).padStart(2,'0');
    document.getElementById("days").textContent = String(days).padStart(2,'0');
    document.getElementById("hours").textContent = String(hours).padStart(2,'0');
    document.getElementById("minutes").textContent = String(minutes).padStart(2,'0');
    document.getElementById("seconds").textContent = String(seconds).padStart(2,'0');
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>
